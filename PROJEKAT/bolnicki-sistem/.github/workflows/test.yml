name: Tests

on:
  push:
    branches: [ main, dev, OsnoveRezervacije ]
  pull_request:
    branches: [ main, dev, OsnoveRezervacije ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ./server
        run: npm install

      - name: Run tests
        working-directory: ./server
        run: npm test